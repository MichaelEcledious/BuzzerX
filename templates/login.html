<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzerX — Contest Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #00f5ff;
    --gold: #ffd700;
    --red: #ff2d55;
    --bg: #050a14;
    --card: #0d1626;
    --border: rgba(0,245,255,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: var(--bg);
    font-family:'Exo 2',sans-serif;
    overflow:hidden;
    position:relative;
  }
  /* Animated grid background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { transform: translateY(60px); } }
  /* Glowing orbs */
  .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; }
  .orb1 { width:500px;height:500px; background:rgba(0,245,255,0.06); top:-100px;left:-100px; animation:orbFloat1 12s ease-in-out infinite; }
  .orb2 { width:400px;height:400px; background:rgba(255,45,85,0.05); bottom:-100px;right:-100px; animation:orbFloat2 15s ease-in-out infinite; }
  @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,60px)} }
  @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-80px)} }

  .container {
    position:relative; z-index:10;
    width:100%; max-width:480px;
    padding:20px;
  }
  .logo {
    text-align:center;
    margin-bottom:40px;
  }
  .logo h1 {
    font-family:'Orbitron',sans-serif;
    font-size:3.5rem; font-weight:900;
    color:white;
    letter-spacing:4px;
    text-shadow: 0 0 30px var(--neon), 0 0 60px rgba(0,245,255,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  .logo h1 span { color: var(--neon); }
  .logo p { color:rgba(255,255,255,0.4); font-size:0.9rem; letter-spacing:3px; text-transform:uppercase; margin-top:8px; }
  @keyframes pulse { 0%,100%{text-shadow:0 0 30px var(--neon),0 0 60px rgba(0,245,255,0.3)} 50%{text-shadow:0 0 50px var(--neon),0 0 100px rgba(0,245,255,0.5)} }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,245,255,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .card h2 {
    font-family:'Orbitron',sans-serif;
    color:white; font-size:1.1rem; font-weight:700;
    letter-spacing:2px; margin-bottom:30px;
    text-align:center;
  }
  .field { margin-bottom:20px; }
  .field label {
    display:block; color:rgba(0,245,255,0.7);
    font-size:0.75rem; letter-spacing:2px; text-transform:uppercase;
    margin-bottom:8px; font-weight:600;
  }
  .field input {
    width:100%; padding:14px 18px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(0,245,255,0.15);
    border-radius:10px; color:white;
    font-family:'Exo 2',sans-serif; font-size:1rem;
    outline:none; transition:all 0.3s;
  }
  .field input:focus {
    border-color:var(--neon);
    box-shadow:0 0 20px rgba(0,245,255,0.15);
    background:rgba(0,245,255,0.03);
  }
  .field input::placeholder { color:rgba(255,255,255,0.2); }

  .role-tabs {
    display:flex; gap:10px; margin-bottom:28px;
  }
  .role-tab {
    flex:1; padding:12px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:10px; color:rgba(255,255,255,0.4);
    font-family:'Exo 2',sans-serif; font-size:0.85rem;
    font-weight:600; letter-spacing:1px; cursor:pointer;
    transition:all 0.3s; text-align:center;
  }
  .role-tab.active-player {
    background:rgba(0,245,255,0.1);
    border-color:var(--neon);
    color:var(--neon);
    box-shadow:0 0 20px rgba(0,245,255,0.1);
  }
  .role-tab.active-host {
    background:rgba(255,215,0,0.1);
    border-color:var(--gold);
    color:var(--gold);
    box-shadow:0 0 20px rgba(255,215,0,0.1);
  }
  input[name="role"] { display:none; }

  .btn-join {
    width:100%; padding:16px;
    background: linear-gradient(135deg, var(--neon), #0080ff);
    border:none; border-radius:12px;
    color:#000; font-family:'Orbitron',sans-serif;
    font-size:1rem; font-weight:700; letter-spacing:2px;
    cursor:pointer; transition:all 0.3s;
    position:relative; overflow:hidden;
  }
  .btn-join::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,transparent,rgba(255,255,255,0.2),transparent);
    transform:translateX(-100%); transition:transform 0.5s;
  }
  .btn-join:hover::after { transform:translateX(100%); }
  .btn-join:hover { transform:translateY(-2px); box-shadow:0 10px 40px rgba(0,245,255,0.4); }
  .btn-join:active { transform:translateY(0); }

  .divider {
    height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent);
    margin:30px 0;
  }
  .info-text {
    text-align:center; color:rgba(255,255,255,0.25);
    font-size:0.8rem; line-height:1.6;
  }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <div class="logo">
    <h1>BUZZER<span>X</span></h1>
    <p>Real-time Contest System</p>
  </div>

  <div class="card">
    <h2>ENTER THE ARENA</h2>
    <form method="POST" action="/join">
      <div class="field">
        <label>Your Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required autocomplete="off">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required autocomplete="off">
      </div>

      <label style="color:rgba(0,245,255,0.7);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;font-weight:600;display:block;margin-bottom:10px;">Join As</label>
      <div class="role-tabs">
        <div class="role-tab active-player" onclick="setRole('player',this)">⚡ PLAYER</div>
        <div class="role-tab" onclick="setRole('host',this)">👑 HOST</div>
      </div>
      <input type="hidden" name="role" id="roleInput" value="player">

      <button type="submit" class="btn-join">JOIN CONTEST →</button>
    </form>
    <div class="divider"></div>
    <p class="info-text">Players compete to be first to buzz in.<br>The Host controls the game flow.</p>
  </div>
</div>

<script>
function setRole(role, el) {
  document.getElementById('roleInput').value = role;
  document.querySelectorAll('.role-tab').forEach(t => t.className='role-tab');
  el.className = 'role-tab active-' + role;
}
</script>
</body>
</html>
