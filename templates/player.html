<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzerX — {{ name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
  :root {
    --neon:#00f5ff; --gold:#ffd700; --red:#ff2d55; --green:#00ff88;
    --bg:#050a14; --card:#0d1626;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:var(--bg); font-family:'Exo 2',sans-serif;
    overflow:hidden; position:relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);
    background-size:60px 60px;
    animation:gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { transform:translateY(60px); } }

  .header {
    position:fixed; top:0; left:0; right:0;
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between;
    background:rgba(5,10,20,0.9); backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(0,245,255,0.1); z-index:100;
  }
  .logo { font-family:'Orbitron',sans-serif; color:var(--neon); font-size:1.2rem; font-weight:900; letter-spacing:3px; }
  .player-info { display:flex; align-items:center; gap:12px; }
  .player-avatar {
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg,var(--neon),#0080ff);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; color:#000; font-size:1rem;
  }
  .player-name { color:white; font-weight:600; font-size:0.9rem; }
  .player-email { color:rgba(255,255,255,0.4); font-size:0.75rem; }
  .btn-leave {
    background:transparent; border:1px solid rgba(255,45,85,0.3);
    color:var(--red); padding:8px 16px; border-radius:8px;
    font-family:'Exo 2',sans-serif; font-size:0.8rem; cursor:pointer;
    transition:all 0.3s; text-decoration:none; display:inline-flex; align-items:center;
  }
  .btn-leave:hover { background:rgba(255,45,85,0.1); border-color:var(--red); }

  .main {
    position:relative; z-index:10;
    display:flex; flex-direction:column; align-items:center;
    gap:40px; padding:100px 20px 20px;
  }
  .status-bar {
    background:rgba(13,22,38,0.9); border:1px solid rgba(0,245,255,0.15);
    border-radius:50px; padding:12px 30px;
    color:rgba(255,255,255,0.5); font-size:0.85rem; letter-spacing:1px;
    min-width:300px; text-align:center; transition:all 0.5s;
  }
  .status-bar.winner { border-color:var(--gold); color:var(--gold); box-shadow:0 0 30px rgba(255,215,0,0.2); }
  .status-bar.locked { border-color:var(--red); color:var(--red); box-shadow:0 0 30px rgba(255,45,85,0.15); }
  .status-bar.ready { border-color:var(--green); color:var(--green); box-shadow:0 0 30px rgba(0,255,136,0.1); }

  /* ── THE BUZZER ── */
  .buzzer-wrap {
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  /* Outer glow rings */
  .ring {
    position:absolute; border-radius:50%; border:1px solid;
    animation:ringPulse 2s ease-in-out infinite;
  }
  .ring1 { width:340px;height:340px; border-color:rgba(0,245,255,0.15); animation-delay:0s; }
  .ring2 { width:400px;height:400px; border-color:rgba(0,245,255,0.08); animation-delay:0.4s; }
  .ring3 { width:460px;height:460px; border-color:rgba(0,245,255,0.04); animation-delay:0.8s; }
  @keyframes ringPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.02)} }

  .buzzer-btn {
    width:280px; height:280px; border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #1a3a4a, #051525);
    border:4px solid var(--neon);
    box-shadow:
      0 0 30px rgba(0,245,255,0.3),
      0 0 60px rgba(0,245,255,0.15),
      0 0 100px rgba(0,245,255,0.05),
      inset 0 0 40px rgba(0,245,255,0.05),
      inset 0 2px 0 rgba(255,255,255,0.1);
    cursor:pointer; position:relative; overflow:hidden;
    transition:all 0.1s;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .buzzer-btn::before {
    content:''; position:absolute;
    top:10%; left:15%; width:40%; height:35%;
    background:radial-gradient(ellipse,rgba(255,255,255,0.12),transparent);
    border-radius:50%; pointer-events:none;
  }
  .buzzer-icon { font-size:3.5rem; margin-bottom:8px; filter:drop-shadow(0 0 10px var(--neon)); }
  .buzzer-label {
    font-family:'Orbitron',sans-serif;
    font-size:1rem; font-weight:700; color:var(--neon);
    letter-spacing:3px; text-shadow:0 0 20px var(--neon);
  }
  .buzzer-sub {
    font-size:0.7rem; color:rgba(0,245,255,0.5);
    letter-spacing:1px; margin-top:4px;
  }

  .buzzer-btn:hover:not(:disabled):not(.locked):not(.winner-btn) {
    transform:scale(1.03);
    box-shadow:
      0 0 50px rgba(0,245,255,0.5),
      0 0 100px rgba(0,245,255,0.25),
      inset 0 0 60px rgba(0,245,255,0.08);
  }
  .buzzer-btn:active:not(:disabled):not(.locked):not(.winner-btn) {
    transform:scale(0.95);
  }
  .buzzer-btn.locked {
    border-color:var(--red); cursor:not-allowed;
    background:radial-gradient(circle at 35% 35%,#2a1a1a,#140505);
    box-shadow:0 0 30px rgba(255,45,85,0.2),inset 0 0 40px rgba(255,45,85,0.05);
  }
  .buzzer-btn.locked .buzzer-icon { filter:drop-shadow(0 0 10px var(--red)); }
  .buzzer-btn.locked .buzzer-label { color:var(--red); text-shadow:0 0 20px var(--red); }
  .buzzer-btn.winner-btn {
    border-color:var(--gold); cursor:default;
    background:radial-gradient(circle at 35% 35%,#2a2000,#141000);
    box-shadow:0 0 60px rgba(255,215,0,0.4),0 0 120px rgba(255,215,0,0.2),inset 0 0 60px rgba(255,215,0,0.08);
    animation:winnerPulse 1s ease-in-out infinite;
  }
  .buzzer-btn.winner-btn .buzzer-icon { filter:drop-shadow(0 0 20px var(--gold)); }
  .buzzer-btn.winner-btn .buzzer-label { color:var(--gold); text-shadow:0 0 30px var(--gold); }
  @keyframes winnerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

  /* Ripple effect */
  .ripple {
    position:absolute; border-radius:50%;
    background:rgba(0,245,255,0.3);
    transform:scale(0); animation:rippleAnim 0.8s ease-out forwards;
    pointer-events:none;
  }
  @keyframes rippleAnim { to { transform:scale(4); opacity:0; } }

  .score-display {
    display:flex; align-items:center; gap:16px;
    background:rgba(13,22,38,0.9); border:1px solid rgba(0,245,255,0.15);
    border-radius:16px; padding:20px 40px;
  }
  .score-label { color:rgba(255,255,255,0.4); font-size:0.8rem; letter-spacing:2px; text-transform:uppercase; }
  .score-value {
    font-family:'Orbitron',sans-serif; font-size:2.5rem; font-weight:900;
    color:var(--gold); text-shadow:0 0 20px rgba(255,215,0,0.5);
    min-width:60px; text-align:center;
  }

  /* Winner banner */
  .winner-banner {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(5,10,20,0.97); border:2px solid var(--gold);
    border-radius:20px; padding:40px 60px; text-align:center;
    z-index:200; display:none; box-shadow:0 0 80px rgba(255,215,0,0.3);
    animation:bannerIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter:blur(20px);
  }
  .winner-banner.show { display:block; }
  @keyframes bannerIn { from{transform:translate(-50%,-50%) scale(0.5);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }
  .winner-banner h2 { font-family:'Orbitron',sans-serif; color:var(--gold); font-size:1.5rem; letter-spacing:3px; margin-bottom:12px; }
  .winner-banner p { color:white; font-size:1.1rem; }
  .winner-banner .winner-name { color:var(--neon); font-size:2rem; font-weight:700; margin-top:8px; font-family:'Orbitron',sans-serif; }
  .confetti { position:fixed; top:0; left:0; right:0; pointer-events:none; z-index:199; }

  /* Particles */
  .particles { position:fixed; inset:0; pointer-events:none; z-index:1; }
  .particle {
    position:absolute; width:2px; height:2px; background:var(--neon);
    border-radius:50%; animation:particleFloat linear infinite;
    opacity:0.3;
  }
  @keyframes particleFloat { from{transform:translateY(100vh)} to{transform:translateY(-100vh)} }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header class="header">
  <div class="logo">BUZZERX</div>
  <div class="player-info">
    <div class="player-avatar">{{ name[0].upper() }}</div>
    <div>
      <div class="player-name">{{ name }}</div>
      <div class="player-email">{{ email }}</div>
    </div>
  </div>
  <a href="/leave" class="btn-leave">✕ Leave</a>
</header>

<main class="main">
  <div class="status-bar ready" id="statusBar">⚡ READY — Waiting for next question...</div>

  <div class="buzzer-wrap">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="buzzer-btn" id="buzzerBtn" onclick="buzz(event)">
      <div class="buzzer-icon">⚡</div>
      <div class="buzzer-label">BUZZ IN</div>
      <div class="buzzer-sub">PRESS TO ANSWER</div>
    </div>
  </div>

  <div class="score-display">
    <div>
      <div class="score-label">Your Score</div>
      <div class="score-value" id="myScore">0</div>
    </div>
  </div>
</main>

<!-- Winner overlay -->
<div class="winner-banner" id="winnerBanner">
  <h2>🏆 BUZZED IN!</h2>
  <p>The winner is</p>
  <div class="winner-name" id="winnerName">—</div>
</div>

<script>
const playerName = "{{ name }}";
const playerEmail = "{{ email }}";
const socket = io();
let myScore = 0;
let isBuzzed = false;

// Generate particles
const container = document.getElementById('particles');
for(let i=0;i<25;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;animation-duration:${8+Math.random()*15}s;animation-delay:${-Math.random()*20}s;opacity:${0.1+Math.random()*0.3};width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
  container.appendChild(p);
}

socket.on('connect',()=>{
  socket.emit('register_player',{name:playerName,email:playerEmail,role:'player'});
});
socket.on('registered',(d)=>{
  if(d.buzzer_locked) setLocked();
});
socket.on('buzz_winner',(d)=>{
  const isMe = d.name===playerName && d.email===playerEmail;
  showWinner(d.name, isMe);
  if(isMe){
    setBuzzerState('winner');
    setStatus('🏆 YOU BUZZED IN FIRST!','winner');
  } else {
    setBuzzerState('locked');
    setStatus(`🔒 ${d.name} buzzed in first!`,'locked');
  }
});
socket.on('buzzer_reset',()=>{
  isBuzzed=false;
  setBuzzerState('ready');
  setStatus('⚡ READY — Waiting for next question...','ready');
  document.getElementById('winnerBanner').classList.remove('show');
});
socket.on('score_update',(d)=>{
  if(d.name===playerName){
    myScore=d.score;
    document.getElementById('myScore').textContent=myScore;
    document.getElementById('myScore').style.animation='none';
    requestAnimationFrame(()=>{
      document.getElementById('myScore').style.animation='';
    });
  }
});
socket.on('kicked',()=>{
  alert('You were removed by the host.');
  window.location='/leave';
});

function buzz(event){
  const btn=document.getElementById('buzzerBtn');
  if(btn.classList.contains('locked')||btn.classList.contains('winner-btn')||isBuzzed) return;
  // Ripple
  const rect=btn.getBoundingClientRect();
  const x=(event.clientX-rect.left);
  const y=(event.clientY-rect.top);
  const rip=document.createElement('div');
  rip.className='ripple';
  rip.style.cssText=`width:80px;height:80px;left:${x-40}px;top:${y-40}px;`;
  btn.appendChild(rip);
  setTimeout(()=>rip.remove(),800);

  isBuzzed=true;
  socket.emit('buzz',{});
  navigator.vibrate && navigator.vibrate([100,50,200]);
}

function setBuzzerState(state){
  const btn=document.getElementById('buzzerBtn');
  btn.className='buzzer-btn';
  const icon=btn.querySelector('.buzzer-icon');
  const label=btn.querySelector('.buzzer-label');
  const sub=btn.querySelector('.buzzer-sub');
  if(state==='locked'){
    btn.classList.add('locked');
    icon.textContent='🔒'; label.textContent='LOCKED'; sub.textContent='SOMEONE BUZZED IN';
  } else if(state==='winner'){
    btn.classList.add('winner-btn');
    icon.textContent='🏆'; label.textContent='YOU WIN!'; sub.textContent='ANSWER NOW!';
  } else {
    icon.textContent='⚡'; label.textContent='BUZZ IN'; sub.textContent='PRESS TO ANSWER';
  }
}

function setLocked(){
  setBuzzerState('locked');
  setStatus('🔒 Buzzer is locked','locked');
}

function setStatus(text,type=''){
  const s=document.getElementById('statusBar');
  s.textContent=text;
  s.className='status-bar'+(type?' '+type:'');
}

function showWinner(name,isMe){
  const b=document.getElementById('winnerBanner');
  const wn=document.getElementById('winnerName');
  b.querySelector('h2').textContent = isMe ? '🏆 YOU BUZZED IN!' : '⚡ BUZZED IN!';
  wn.textContent=name;
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),3500);
}

// Keyboard shortcut: Space to buzz
document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'||e.code==='Enter'){
    e.preventDefault();
    buzz({clientX:window.innerWidth/2,clientY:window.innerHeight/2});
  }
});
</script>
</body>
</html>
